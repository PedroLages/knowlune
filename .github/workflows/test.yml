name: E2E Test Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly burn-in: Monday 6am UTC
    - cron: '0 6 * * 1'

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  CI: true

jobs:
  # ──────────────────────────────────────────────
  # E2E Tests — 4 parallel shards
  # ──────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-v2-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-v2-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run E2E tests (shard ${{ matrix.shard }}/4)
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 2
          retry_on: error
          command: npx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

      - name: Upload trace artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: traces-shard-${{ matrix.shard }}
          path: test-results/**/*.zip
          retention-days: 30

  # ──────────────────────────────────────────────
  # Burn-In — Flaky test detection
  # Runs on PRs and weekly schedule
  # ──────────────────────────────────────────────
  burn-in:
    name: Flaky Test Detection (10 iterations)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-v2-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-v2-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run burn-in loop (10 iterations)
        run: npx playwright test --project=chromium --repeat-each=10

      - name: Upload burn-in failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-failures
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  # ──────────────────────────────────────────────
  # Deletion Probe — GDPR erasure verification
  #
  # Runs only on pull_request events that touch the erasure surface:
  #   - src/lib/sync/tableRegistry.ts
  #   - supabase/functions/delete-account/**
  #   - supabase/functions/retention-tick/**
  #   - supabase/functions/_shared/hardDeleteUser.ts
  #
  # Requires GitHub secrets:
  #   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, DELETION_PROBE_USER_ID
  #
  # DELETION_PROBE_USER_ID must be the UUID of a test Supabase user that has
  # been hard-deleted (all application data erased). To set up:
  #   1. Create a test user in the Supabase dashboard
  #   2. Call the delete-account Edge Function for that user
  #   3. Run retention-tick manually in the test environment (or wait 7 days)
  #   4. Record the UUID as the DELETION_PROBE_USER_ID secret
  #
  # Fork PRs without secrets: the job skips gracefully (continue-on-error).
  # ──────────────────────────────────────────────
  deletion-probe:
    name: GDPR Deletion Probe
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect erasure-surface changes
        id: paths-filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            erasure:
              - 'src/lib/sync/tableRegistry.ts'
              - 'supabase/functions/delete-account/**'
              - 'supabase/functions/retention-tick/**'
              - 'supabase/functions/_shared/hardDeleteUser.ts'
              - 'scripts/ci/probe-constants.ts'

      - name: Setup Node.js
        if: steps.paths-filter.outputs.erasure == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        if: steps.paths-filter.outputs.erasure == 'true'
        run: npm ci

      - name: Run deletion probe
        if: steps.paths-filter.outputs.erasure == 'true'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          USER_ID: ${{ secrets.DELETION_PROBE_USER_ID }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || [ -z "$USER_ID" ]; then
            echo "Deletion probe secrets not available (fork PR or missing configuration). Skipping."
            exit 0
          fi
          npx tsx scripts/ci/deletion-probe.ts

      - name: Skip message (no erasure-surface changes)
        if: steps.paths-filter.outputs.erasure != 'true'
        run: echo "No erasure-surface files changed — deletion probe skipped."

  # ──────────────────────────────────────────────
  # Test Report — Aggregate results
  # ──────────────────────────────────────────────
  test-report:
    name: Test Pipeline Status
    runs-on: ubuntu-latest
    needs: [e2e-tests, burn-in, deletion-probe]
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "E2E Tests: ${{ needs.e2e-tests.result }}"
          echo "Burn-In: ${{ needs.burn-in.result }}"
          echo "Deletion Probe: ${{ needs.deletion-probe.result }}"

          if [ "${{ needs.e2e-tests.result }}" == "failure" ]; then
            echo "E2E tests failed - check shard artifacts for details"
            exit 1
          fi

          if [ "${{ needs.burn-in.result }}" == "failure" ]; then
            echo "Burn-in detected flaky tests - check burn-in artifacts"
            exit 1
          fi

          echo "All test checks passed"
