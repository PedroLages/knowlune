name: E2E Test Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly burn-in: Monday 6am UTC
    - cron: '0 6 * * 1'

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  CI: true

jobs:
  # ──────────────────────────────────────────────
  # E2E Tests — 4 parallel shards
  # ──────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - name: Run E2E tests (shard ${{ matrix.shard }}/4)
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 2
          retry_on: error
          command: npx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

      - name: Upload trace artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: traces-shard-${{ matrix.shard }}
          path: test-results/**/*.zip
          retention-days: 30

  # ──────────────────────────────────────────────
  # Burn-In — Flaky test detection
  # Runs on PRs and weekly schedule
  # ──────────────────────────────────────────────
  burn-in:
    name: Flaky Test Detection (10 iterations)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run burn-in loop (10 iterations)
        run: |
          for i in {1..10}; do
            echo "=== Burn-in iteration $i/10 ==="
            npx playwright test --project=chromium || exit 1
          done

      - name: Upload burn-in failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-failures
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  # ──────────────────────────────────────────────
  # Test Report — Aggregate results
  # ──────────────────────────────────────────────
  test-report:
    name: Test Pipeline Status
    runs-on: ubuntu-latest
    needs: [e2e-tests, burn-in]
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "E2E Tests: ${{ needs.e2e-tests.result }}"
          echo "Burn-In: ${{ needs.burn-in.result }}"

          if [ "${{ needs.e2e-tests.result }}" == "failure" ]; then
            echo "E2E tests failed - check shard artifacts for details"
            exit 1
          fi

          if [ "${{ needs.burn-in.result }}" == "failure" ]; then
            echo "Burn-in detected flaky tests - check burn-in artifacts"
            exit 1
          fi

          echo "All test checks passed"
