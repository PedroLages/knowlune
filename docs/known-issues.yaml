# Pre-existing issues discovered during /review-story that were NOT caused
# by the story under review. Tracked here for later triage.
#
# Lifecycle:
#   /review-story  → auto-appends when pre-existing issues are found
#   /start-story   → warns if open issues match files being changed
#   /sprint-status → reports open issue count as a health metric
#   Post-epic      → triage session: schedule, wont-fix, or close items
#
# Fields:
#   id:              KI-NNN (auto-increment)
#   type:            test | lint | typecheck | build | design | code | architecture | security | ux | performance | accessibility | reliability | tech-debt | feature
