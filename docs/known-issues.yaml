  - id: KI-BETA-002
    type: security
    summary: "Kong CORS '*' on /functions/v1/* and FUNCTIONS_VERIFY_JWT=false (router auth-open)"
    file: "titan:/mnt/cache/appdata/supabase/kong/api/kong.yml (functions-v1 plugin: cors with no config)"
    severity: low
    discovered_by: ce-review-2026-04-22-beta-blockers
    discovered_on: 2026-04-22
    status: fixed
    scheduled_for: E119
    fixed_by: 2026-07-02 immediate-security-fixes
    notes: |
      Resolved at function level by 2026-07-02 immediate-security-fixes:
      - vault-credentials: replaced wildcard CORS with origin-check.ts pattern (ALLOWED_ORIGINS env var)
      - calendar: wildcard CORS confirmed intentional (public iCal feed, protected by feed_token)
      - CORS audit: all other Edge Functions verified — no unintended wildcards
      - ALLOWED_ORIGINS added to WORKER_ENV_ALLOWLIST in main/index.ts
      - Kong-level CORS tightening deferred (self-hosted, fragile config change; function-level hardening is sufficient)

      Why this was accepted as LOW (not medium/high) pre-beta:
      - Knowlune uses bearer-token auth in localStorage, not cookies.
        Cross-origin pages (evil.com) cannot read the token and therefore
        cannot construct an authenticated request regardless of CORS policy.
        CORS * is a bad smell, not an exploitable hole in this architecture.
      - Every Edge Function re-validates the JWT internally.

      When this must be revisited (trigger for moving to medium/high):
      - Any migration to cookie-based auth (Supabase SSR, password-reset
        cookies, OAuth code flow that sets a session cookie).
      - Adding any Edge Function that performs privileged work without its
        own auth check (e.g., webhooks that don't verify signatures).
      - Reports of abuse, credential stuffing, or suspicious traffic.

      Remediation when needed:
      - Kong: set functions-v1 CORS plugin config.origins to
        [APP_URL, http://localhost:5173], config.credentials=true,
        config.headers=[Accept, Authorization, Content-Type, X-Client-Info, apikey].
      - Compose: set FUNCTIONS_VERIFY_JWT=true; smoke-test every function
        (public webhooks like stripe-webhook must be moved to a separate
        no-verify route or use Kong's request-transformer).

- id: KI-E119-S02-001
