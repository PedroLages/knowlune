- id: KI-E119-POST-005
  type: architecture
  summary: "WORKER_ENV_ALLOWLIST in main/index.ts silently drops secrets, bypassing auth checks"
  file: supabase/functions/main/index.ts
  severity: medium
  discovered_by: E119-post-epic
  discovered_on: 2026-04-24
  status: fixed
  fixed_by: 2026-07-02 immediate-security-fixes
  notes: |
    Fixed by 2026-07-02 immediate-security-fixes:
    - Created _shared/envCheck.ts with requireWorkerEnv(key) helper
    - Throws [ENV-FAIL-CLOSED] in deployed environments (DENO_REGION set) when secrets missing
    - Returns empty string in local dev (DENO_REGION not set or "local") for dev convenience
    - KNOWLUNE_DEPLOYED=true also triggers fail-closed (alternative for self-hosted without DENO_REGION)
    - Wired to retention-tick (RETENTION_TICK_SECRET) and export-worker (EXPORT_WORKER_SECRET)

    Original issue: main/index.ts filters env vars before spawning child Deno workers via
    WORKER_ENV_ALLOWLIST. A function reading env X silently gets undefined
    inside the worker if X is not allowlisted. Auth-check code used fail-open:
          // falls through, endpoint is unauthenticated
        }

    When the allowlist drops the secret, the function thinks the operator
    chose to disable auth, and silently accepts unauthenticated requests.

    This exact bug bit TWICE in E119-post-epic (2026-04-24):
      * RETENTION_TICK_SECRET — fixed at commit 50a5ddfa
      * EXPORT_WORKER_SECRET — fixed at commit 445a6f39

    Both times the secret was correctly set on the container but filtered
    out by main/index.ts. The only way to notice was curl-verify-401 tests.

    Remediation options (pick one for a future story):

    Option A (minimal): fail-closed in each function. Change the pattern to:
        const SECRET = Deno.env.get('SECRET_NAME')
        if (!SECRET) throw new Error('SECRET_NAME is required')
      This catches the bug at function boot (function returns 500) rather
      than silently running without auth. Downside: breaks local dev without
      the secret set.

    Option B (better): denylist instead of allowlist in main/index.ts.
      Forward all env vars except known-unsafe ones (KONG_*, POSTGRES_*
      admin passwords). Less footgun but requires careful audit of what's
      actually unsafe.

    Option C (best): runtime check in main/index.ts that matches function
      names to declared env requirements (e.g., a supabase/functions/manifest.json
      listing each function's required env). Fail to dispatch if missing.
      Most work, highest safety.

    Suggested scope: address in E119-S16 or as part of a broader Edge
    Function security review before beta exit.
