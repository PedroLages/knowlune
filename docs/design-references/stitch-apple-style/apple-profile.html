</div>

<main class="pt-24 pb-32 max-w-2xl mx-auto px-4">

<div class="relative mt-8">
<div class="w-24 h-24 rounded-full overflow-hidden ring-4 ring-surface-container-highest">

</div>

<span class="material-symbols-outlined text-on-tertiary-container text-sm" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
</div>
<h2 class="mt-6 text-2xl font-bold tracking-tight text-on-surface">Profile Settings</h2>
<p class="text-on-surface-variant text-sm mt-1">Manage your digital atelier identity</p>
</section>
<!-- Form Sections -->
<form class="space-y-8">
<!-- Basic Information Group -->
<div>
<h3 class="ml-4 mb-2 text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Account Details</h3>
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_12px_32px_rgba(44,51,61,0.04)] overflow-hidden">
<div class="px-5 py-4 hairline-divider flex flex-col gap-1">
<label class="text-[0.6875rem] font-bold text-tertiary uppercase tracking-tight">Display Name</label>
<input class="w-full bg-transparent border-none p-0 text-on-surface focus:ring-0 text-base placeholder:text-outline-variant" placeholder="Enter your name" type="text" value="Julian Vance"/>
</div>
<div class="px-5 py-4 flex flex-col gap-1">
<label class="text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-tight">Email Address</label>
<input class="w-full bg-transparent border-none p-0 text-surface-dim focus:ring-0 text-base cursor-not-allowed" disabled="" type="email" value="julian.v@atelier.edu"/>
</div>
</div>
</div>
<!-- Bio Group -->
<div>
<h3 class="ml-4 mb-2 text-xs font-semibold text-on-surface-variant uppercase tracking-wider">About You</h3>
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_12px_32px_rgba(44,51,61,0.04)] overflow-hidden">
<div class="px-5 py-4 flex flex-col gap-1">
<label class="text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-tight">Bio</label>
<textarea class="w-full bg-transparent border-none p-0 text-on-surface focus:ring-0 text-base resize-none leading-relaxed placeholder:text-outline-variant" placeholder="Share your learning journey..." rows="4">An aspiring curator of digital experiences, currently focusing on the intersection of classical philosophy and modern design systems. Always learning.</textarea>
</div>
</div>
</div>
<!-- Preferences Group -->
<div>
<h3 class="ml-4 mb-2 text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Preferences</h3>
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_12px_32px_rgba(44,51,61,0.04)] overflow-hidden">
<div class="px-5 py-4 hairline-divider flex justify-between items-center">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">visibility</span>
<span class="text-base text-on-surface">Public Profile</span>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-high rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-tertiary"></div>
</div>
</div>
<div class="px-5 py-4 flex justify-between items-center">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">notifications</span>
<span class="text-base text-on-surface">Study Reminders</span>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-high rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-tertiary"></div>
</div>
</div>
</div>
</div>

<button class="w-full py-4 bg-primary text-on-primary rounded-xl font-semibold shadow-[0px_12px_32px_rgba(44,51,61,0.06)] hover:bg-primary-dim transition-all active:scale-[0.98]" type="submit">
                    Save All Changes
                </button>
<button class="text-sm font-medium text-error hover:opacity-80 transition-opacity" type="button">
                    Deactivate Account
                </button>
</div>
</form>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center pb-safe pt-2 px-4 bg-[#f9f9fe]/80 backdrop-blur-xl z-50 border-t border-[#acb2bf]/15 shadow-[0px_-2px_10px_rgba(0,0,0,0.02)]">
