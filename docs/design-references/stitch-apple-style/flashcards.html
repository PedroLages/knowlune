<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Knowlune - Cloud Computing Fundamentals</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        @layer utilities {
            .material-symbols-outlined {
                font-family: 'Material Symbols Outlined';
                font-weight: normal;
                font-style: normal;
                font-size: 24px;
                line-height: 1;
                letter-spacing: normal;
                text-transform: none;
                display: inline-block;
                white-space: nowrap;
                word-wrap: normal;
                direction: ltr;
                -webkit-font-feature-settings: 'liga';
                -webkit-font-smoothing: antialiased;
            }
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#f5f2fc",
                        "surface-container-high": "#e9e7f0",
                        "surface-tint": "#4854bb",
                        "on-tertiary-container": "#fffaf8",
                        "surface-container": "#efecf6",
                        "secondary-fixed-dim": "#b7c8e1",
                        "surface": "#fbf8ff",
                        "surface-container-highest": "#e4e1eb",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#dbd9e2",
                        "secondary-fixed": "#d3e4fe",
                        "primary-fixed-dim": "#bdc2ff",
                        "on-surface-variant": "#454652",
                        "primary": "#4450b7",
                        "outline-variant": "#c6c5d5",
                        "tertiary-fixed-dim": "#ffb867",
                        "primary-container": "#5e6ad2",
                        "tertiary-fixed": "#ffddbb",
                        "on-primary-fixed-variant": "#2e3aa2",
                        "surface-bright": "#fbf8ff",
                        "surface-variant": "#e4e1eb",
                        "on-secondary-fixed-variant": "#38485d",
                        "on-primary-container": "#fdfaff",
                        "secondary": "#505f76",
                        "on-tertiary-fixed": "#2b1700",
                        "error-container": "#ffdad6",
                        "tertiary": "#834f00",
                        "inverse-on-surface": "#f2eff9",
                        "on-secondary-container": "#54647a",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#673d00",
                        "inverse-primary": "#bdc2ff",
                        "secondary-container": "#d0e1fb",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-surface": "#1b1b22",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#0b1c30",
                        "surface-container-lowest": "#ffffff",
                        "background": "#fbf8ff",
                        "outline": "#767684",
                        "inverse-surface": "#303037",
                        "on-background": "#1b1b22",
                        "tertiary-container": "#a56500",
                        "primary-fixed": "#dfe0ff",
                        "on-primary-fixed": "#000965"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap": "12px",
                        "card-padding": "32px",
                        "container-padding": "24px",
                        "unit": "8px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-md": ["Inter"],
                        "display-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["19px", { "lineHeight": "26px", "letterSpacing": "-0.1px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "30px", "letterSpacing": "-0.2px", "fontWeight": "600" }],
                        "label-sm": ["13px", { "lineHeight": "18px", "letterSpacing": "0.1px", "fontWeight": "500" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "600" }],
                        "body-md": ["17px", { "lineHeight": "22px", "letterSpacing": "-0.1px", "fontWeight": "400" }],
                        "display-lg": ["34px", { "lineHeight": "41px", "letterSpacing": "-0.4px", "fontWeight": "700" }]
                    },
                    "boxShadow": {
                        "soft": "0px 4px 24px rgba(0, 0, 0, 0.04)"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-14 bg-[#fbf8ff] dark:bg-slate-950 border-b border-gray-100 dark:border-gray-800">
<div class="flex items-center gap-4">
<button aria-label="Close" class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
<span class="material-symbols-outlined text-[#5e6ad2] dark:text-[#7c89ff]">close</span>
</button>
<span class="text-lg font-bold text-[#5e6ad2] dark:text-[#7c89ff]">Knowlune</span>
</div>
<div class="hidden md:flex flex-1 justify-center">
<div class="flex items-center gap-2">
<span class="font-body-lg text-on-surface-variant font-medium">Cloud Computing Fundamentals</span>
</div>
</div>
<div class="flex items-center gap-4">
<div class="flex flex-col items-end">
<span class="font-label-caps text-on-surface-variant uppercase tracking-wider">Card 7 of 24</span>
</div>
</div>
</header>
<!-- Progress Bar (below header) -->
<div class="fixed top-14 w-full h-1 bg-surface-variant z-40">
<div class="h-full bg-primary-container" style="width: 29%;"></div>
</div>
<!-- Main Layout Grid -->
<div class="pt-[60px] flex h-screen max-w-[1440px] mx-auto">
<!-- Canvas Area (Center) -->
<main class="flex-1 flex flex-col justify-center items-center p-8 lg:pr-[300px] relative">
<!-- Flashcard Container -->
<div class="w-full max-w-2xl aspect-[4/3] bg-surface-container-lowest rounded-2xl shadow-soft flex flex-col justify-center items-center p-card-padding text-center relative cursor-pointer border border-surface-variant transition-transform hover:scale-[1.01]">
<div class="absolute top-6 right-6 flex gap-2">
<span class="px-3 py-1 bg-surface-container-low text-primary-container font-label-sm rounded-full border border-outline-variant">Hard</span>
</div>
<h2 class="font-display-lg text-on-surface mb-8 px-4">
                    What is the difference between a container and a virtual machine?
                </h2>
<div class="absolute bottom-8 w-full flex justify-center text-on-surface-variant opacity-60">
<span class="font-label-sm flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">touch_app</span>
                        Tap to reveal answer
                    </span>
</div>
</div>
<!-- Action Buttons (Spaced Repetition) -->
<div class="mt-12 w-full max-w-2xl grid grid-cols-4 gap-4">
<button class="flex flex-col items-center justify-center py-4 px-2 rounded-xl bg-error-container/30 border border-error-container hover:bg-error-container/50 transition-colors group">
<span class="font-label-caps text-error mb-1">AGAIN</span>
<span class="font-label-sm text-error/80 flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">history</span> &lt; 1m
                    </span>
</button>
<button class="flex flex-col items-center justify-center py-4 px-2 rounded-xl bg-tertiary-container/10 border border-tertiary-container/20 hover:bg-tertiary-container/20 transition-colors group">
<span class="font-label-caps text-tertiary-container mb-1">HARD</span>
<span class="font-label-sm text-tertiary-container/80 flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">schedule</span> 10m
                    </span>
</button>
<button class="flex flex-col items-center justify-center py-4 px-2 rounded-xl bg-[#cce8cd]/30 border border-[#cce8cd] hover:bg-[#cce8cd]/50 transition-colors group">
<span class="font-label-caps text-[#2d662f] mb-1">GOOD</span>
<span class="font-label-sm text-[#2d662f]/80 flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">check_circle</span> 1d
                    </span>
</button>
<button class="flex flex-col items-center justify-center py-4 px-2 rounded-xl bg-primary-container/10 border border-primary-container/20 hover:bg-primary-container/20 transition-colors group">
<span class="font-label-caps text-primary-container mb-1">EASY</span>
<span class="font-label-sm text-primary-container/80 flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">sentiment_very_satisfied</span> 4d
                    </span>
</button>
</div>
</main>
<!-- SideNavBar -->
<aside class="fixed right-0 top-[60px] h-[calc(100vh-60px)] w-[280px] bg-white dark:bg-slate-900 border-l border-gray-100 dark:border-gray-800 p-6 hidden lg:flex flex-col gap-8 overflow-y-auto">
<div class="mb-4">
<h3 class="font-headline-md text-on-surface mb-1">Session Stats</h3>
<p class="font-label-sm text-on-surface-variant">Current Deck Performance</p>
</div>
<!-- Stats Bento Grid -->
<div class="flex flex-col gap-4">
<!-- Stat Card 1 -->
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl p-5 flex flex-col gap-2">
<div class="flex items-center gap-2 text-on-surface-variant mb-1">
<span class="material-symbols-outlined text-[20px] text-primary-container">analytics</span>
<span class="font-label-sm">Cards Learned Today</span>
</div>
<div class="font-display-lg text-on-surface">
                        42
                    </div>
</div>
<!-- Stat Card 2 -->
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl p-5 flex flex-col gap-2">
<div class="flex items-center gap-2 text-on-surface-variant mb-1">
<span class="material-symbols-outlined text-[20px] text-secondary">timer</span>
<span class="font-label-sm">Study Time</span>
</div>
<div class="font-headline-md text-on-surface">
                        23 <span class="font-body-md text-on-surface-variant">min</span>
</div>
</div>
<!-- Stat Card 3 -->
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl p-5 flex flex-col gap-4">
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px] text-primary-container">inventory_2</span>
<span class="font-label-sm">Retention Rate</span>
</div>
<div class="flex items-center justify-between">
<div class="font-display-lg text-on-surface">
                            87%
                        </div>
<!-- Simple Circular Progress SVG -->
<div class="relative w-12 h-12">
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 36 36">
<circle class="stroke-surface-variant" cx="18" cy="18" fill="none" r="16" stroke-width="4"></circle>
<circle class="stroke-primary-container" cx="18" cy="18" fill="none" r="16" stroke-dasharray="100" stroke-dashoffset="13" stroke-width="4"></circle>
</svg>
</div>
</div>
</div>
</div>
<div class="mt-auto">
<button class="w-full py-3 px-4 bg-surface-container-low text-primary-container font-label-sm rounded-lg border border-outline-variant hover:bg-surface-container transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">pause</span>
                    Pause Session
                </button>
</div>
</aside>
</div>
</body></html>
