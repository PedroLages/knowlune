version: '3.8'

services:
  # Type checking service
  typecheck:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CI=true
    command: sh -c "npm ci && npx tsc --noEmit"
    profiles:
      - ci

  # Linting service
  lint:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CI=true
    command: sh -c "npm ci && npm run lint"
    profiles:
      - ci

  # Format checking service
  format:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CI=true
    command: sh -c "npm ci && npx prettier --check 'src/**/*.{ts,tsx,js,jsx,css,md}'"
    profiles:
      - ci

  # Build service
  build:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./dist:/app/dist
    environment:
      - CI=true
      - NODE_ENV=production
    command: sh -c "npm ci && npm run build"
    profiles:
      - ci

  # Unit tests service
  unit-tests:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CI=true
    command: sh -c "npm ci && npm run test -- --run --coverage"
    profiles:
      - ci

  # E2E tests service with Playwright
  e2e-tests:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CI=true
      - HOME=/tmp
    command: sh -c "npm ci && npx playwright install chromium && npx playwright test"
    profiles:
      - ci
    depends_on:
      - build

  # All CI checks in one run
  ci-full:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CI=true
    command: sh -c "echo 'Running full CI pipeline via docker-compose'"
    profiles:
      - ci
    depends_on:
      - typecheck
      - lint
      - format
      - build
      - unit-tests

volumes:
  node_modules:
