<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Knowlune — You're offline</title>
  <style>
    /* Inline all styles — no remote fonts available offline */
    :root { --brand: #5e6ad2; --bg: #FAF5EE; --text: #1a1a2e; --muted: #6b6b7b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    .logo { width: 64px; height: 64px; margin-bottom: 1.5rem; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: var(--muted); margin-bottom: 2rem; }
    .links { list-style: none; width: 100%; max-width: 320px; text-align: left; margin-bottom: 1.5rem; }
    .links li a { display: block; padding: 0.75rem 1rem; border-radius: 0.75rem; background: white; border: 1px solid #e5e7eb; color: var(--text); text-decoration: none; margin-bottom: 0.5rem; font-size: 0.875rem; }
    .links li a:hover { border-color: var(--brand); color: var(--brand); }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1.25rem; background: var(--brand); color: white; border-radius: 0.75rem; border: none; font-size: 0.875rem; font-weight: 500; cursor: pointer; text-decoration: none; }
  </style>
</head>
<body>
  <!-- Inline SVG logo to avoid requiring cached asset -->
  <svg class="logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <rect width="64" height="64" rx="16" fill="#5e6ad2"/>
    <path d="M16 20h32M16 32h20M16 44h24" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </svg>
  <h1>You're offline</h1>
  <p>But your library is available</p>
  <ul class="links" id="recent-routes"></ul>
  <a href="/library" class="btn">Back to Library</a>

  <script>
    (async () => {
      try {
        const keys = await caches.keys()
        const routes = []
        const seen = new Set()
        for (const key of keys) {
          const cache = await caches.open(key)
          const reqs = await cache.keys()
          for (const req of reqs) {
            const url = new URL(req.url)
            if (url.origin !== location.origin) continue
            const p = url.pathname
            if (p === '/' || p === '/offline.html' || seen.has(p)) continue
            if (p.startsWith('/api/') || p.includes('.')) continue
            seen.add(p)
            routes.push(p)
            if (routes.length >= 5) break
          }
          if (routes.length >= 5) break
        }
        const list = document.getElementById('recent-routes')
        if (routes.length > 0 && list) {
          routes.forEach(function(r) {
            const li = document.createElement('li')
            const a = document.createElement('a')
            a.href = r
            a.textContent = r.replace(/^\//, '').replace(/-/g, ' ') || 'Home'
            li.appendChild(a)
            list.appendChild(li)
          })
        }
      } catch (_) { /* Cache API unavailable — show static fallback */ }
    })()
  </script>
</body>
</html>
