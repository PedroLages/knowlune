<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowlune — Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #FAF5EE;
        color: #030213;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 80px;
        height: 80px;
        background: #030213;
        border-radius: 18px;
        margin-bottom: 2rem;
      }
      .logo span {
        color: #FAF5EE;
        font-size: 34px;
        font-weight: 900;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
      }
      p {
        color: #64748b;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      button {
        background: #030213;
        color: #FAF5EE;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo"><span>Kn</span></div>
      <h1>You're offline</h1>
      <p>Check your internet connection and try again. Your local data is safe.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
