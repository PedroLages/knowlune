# Cloudflare Workers configuration for Knowlune retention cron trigger.
#
# Location note: this file lives in `cloudflare-workers/` (not repo root) so
# Cloudflare Pages does not confuse it with a Pages config during SPA builds.
# Deploy from this directory: `cd cloudflare-workers && wrangler deploy`.
#
# Purpose: Schedules the daily retention-tick Edge Function via Cloudflare's
# managed cron infrastructure. The Worker is a minimal HTTP pass-through that
# calls the Supabase Edge Function URL with the shared secret header.
#
# Deployment runbook: docs/deployment/retention-cron-setup.md
#
# Secret management (set from this directory):
#   wrangler secret put RETENTION_TICK_SECRET
#   wrangler secret put SUPABASE_FUNCTIONS_URL

name = "knowlune-retention-cron"
main = "retention-cron.js"
compatibility_date = "2024-01-01"

[triggers]
# Daily at 03:00 UTC
crons = ["0 3 * * *"]

# Environment variables (non-sensitive)
# Sensitive values (RETENTION_TICK_SECRET, SUPABASE_FUNCTIONS_URL) are stored
# as Worker secrets — set via `wrangler secret put <NAME>`, not here.
[vars]
WORKER_NAME = "retention-cron"
