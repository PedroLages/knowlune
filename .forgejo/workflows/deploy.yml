name: Deploy to Titan

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker CLI and SSH
        run: |
          apt-get update -qq
          apt-get install -y -qq docker.io openssh-client > /dev/null

      - name: Build Docker image
        run: docker build -t knowlune:latest .

      - name: Deploy to titan
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 192.168.2.200 >> ~/.ssh/known_hosts 2>/dev/null

          # Stream image directly to host Docker daemon
          docker save knowlune:latest | gzip | \
            ssh -o StrictHostKeyChecking=no root@192.168.2.200 "gunzip | docker load"

          # Restart the stack
          ssh root@192.168.2.200 \
            "cd /mnt/cache/docker/stacks/knowlune && docker compose up -d --force-recreate"

      - name: Cleanup
        if: always()
        run: docker image prune -f 2>/dev/null || true
