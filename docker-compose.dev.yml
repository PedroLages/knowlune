version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: levelup-dev
    ports:
      - "5173:5173"
    volumes:
      # Bind mount source code for hot reload
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.app.json:/app/tsconfig.app.json
      - ./tsconfig.node.json:/app/tsconfig.node.json

      # Prevent node_modules from being overwritten
      - /app/node_modules

      # Optional: Mount styles and config files
      - ./tailwind.config.js:/app/tailwind.config.js
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - VITE_HOST=0.0.0.0
      - VITE_API_URL=http://mock-api:3000/api
    networks:
      - levelup-network
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      - mock-api

  mock-api:
    image: mockoon/cli:latest
    container_name: levelup-mock-api
    ports:
      - "3000:3000"
    volumes:
      - ./mockoon-data.json:/data/mockoon-data.json:ro
    command: ["--data", "/data/mockoon-data.json", "--port", "3000"]
    networks:
      - levelup-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/user/profile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  storybook:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: levelup-storybook
    ports:
      - "6006:6006"
    volumes:
      # Bind mount source code for hot reload
      - ./src:/app/src
      - ./.storybook:/app/.storybook
      - ./public:/app/public
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.app.json:/app/tsconfig.app.json
      - ./tsconfig.node.json:/app/tsconfig.node.json

      # Prevent node_modules from being overwritten
      - /app/node_modules

      # Mount styles and config files
      - ./tailwind.config.js:/app/tailwind.config.js
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    command: npm run storybook
    networks:
      - levelup-network
    restart: unless-stopped
    stdin_open: true
    tty: true

networks:
  levelup-network:
    driver: bridge
