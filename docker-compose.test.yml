services:
  # Vite preview server for Lighthouse testing
  preview:
    build:
      context: .
      dockerfile: Dockerfile.preview
    ports:
      - "4173:4173"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4173"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    profiles:
      - lighthouse

  # Lighthouse CI performance testing service
  lighthouse:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules  # Anonymous volume to prevent host override
      - ./lighthouserc.cjs:/app/lighthouserc.cjs
      - ./.lighthouseci:/app/.lighthouseci
    environment:
      - CI=true
      - LHCI_BUILD_CONTEXT__CURRENT_HASH=${GITHUB_SHA:-local}
      - LHCI_BUILD_CONTEXT__COMMIT_TIME=${COMMIT_TIME:-$(date +%Y-%m-%dT%H:%M:%S)}
      - LHCI_BUILD_CONTEXT__CURRENT_BRANCH=${GITHUB_REF_NAME:-main}
      - LHCI_BUILD_CONTEXT__COMMIT_MESSAGE=${COMMIT_MESSAGE:-Local Lighthouse run}
    command: sh -c "
      npm ci &&
      npx lhci autorun --config=lighthouserc.cjs ||
      (echo '⚠️ Lighthouse CI found issues. Check the report links above.' && exit 1)
      "
    depends_on:
      preview:
        condition: service_healthy
    profiles:
      - lighthouse
    networks:
      - default

  # Combined service to run all performance tests
  performance-tests:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "echo 'Running Lighthouse CI performance tests via docker-compose'"
    depends_on:
      - lighthouse
    profiles:
      - lighthouse

  # Development server for Playwright tests
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules  # Anonymous volume to prevent host override
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles:
      - playwright
      - a11y
    networks:
      - test-network

  # Playwright service for all tests
  playwright:
    image: mcr.microsoft.com/playwright:v1.41.0-focal
    depends_on:
      app:
        condition: service_healthy
    environment:
      - CI=true
      - PLAYWRIGHT_BASE_URL=http://app:5173
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: sh -c "npm ci && npx playwright test --config=playwright.config.ts"
    profiles:
      - playwright
    networks:
      - test-network

  # Dedicated service for accessibility tests
  a11y-tests:
    image: mcr.microsoft.com/playwright:v1.41.0-focal
    depends_on:
      app:
        condition: service_healthy
    environment:
      - CI=true
      - PLAYWRIGHT_BASE_URL=http://app:5173
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: sh -c "npm ci && npx playwright test tests/accessibility.spec.ts --config=playwright.config.ts --project=a11y-desktop --project=a11y-mobile"
    profiles:
      - a11y
    networks:
      - test-network

networks:
  default:
    driver: bridge
  test-network:
    driver: bridge
